services:
  frontend:
    build: .
    env_file:
      - .env
      - .env.prod
    container_name: client
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev # Use dev for hot-reloading during development
    ports:
      - '3020:3020'
    networks: [qucore_auth_network]

networks:
  qucore_auth_network:
    external: true
